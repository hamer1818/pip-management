name: "Build and Release"

# Her push ve pull request'te çalış
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# İş izinleri
permissions:
  contents: write

env:
  PYTHONIOENCODING: utf-8
  PYTHONLEGACYWINDOWSSTDIO: utf-8

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: "Checkout code"
      uses: actions/checkout@v4
      
    - name: "Set up Python"
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        
    - name: "Cache dependencies"
      uses: actions/cache@v3
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: "Install dependencies"
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: "Generate version info"
      run: |
        $commit = "${{ github.sha }}".Substring(0,7)
        $date = Get-Date -Format "yyyy.MM.dd"
        $time = Get-Date -Format "HHmm"
        $version = "v$date-$time-$commit"
        
        echo "BUILD_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "[INFO] Build version: $version"
        
    - name: "Update version.py"
      run: |
        $content = @"
        # Modern Python Pip Paket Yonetcisi Version Bilgileri
        # Author: Hamza ORTATEPE
        # Email: hamzaortatepe@hotmail.com
        # Build Date: $(Get-Date -Format "yyyy-MM-dd")
        
        __version__ = "$env:BUILD_VERSION"
        __app_name__ = "Modern Python Pip Paket Yoneticisi"
        __author__ = "Hamza ORTATEPE"
        __email__ = "hamzaortatepe@hotmail.com"
        __build_date__ = "$(Get-Date -Format "yyyy-MM-dd")"
        __description__ = "Modern Python pip paket yonetcisi - ttkbootstrap ile GUI"
        "@
        
        $content | Out-File -FilePath "version.py" -Encoding utf8
        echo "[INFO] Version bilgisi guncellendi"
        
    - name: "Build executable"
      run: |
        echo "[BUILD] Exe dosyasi olusturuluyor..."
        python build_exe.py
        
    - name: "Verify build"
      run: |
        if (Test-Path "dist\ModernPipManager.exe") {
            $size = (Get-Item "dist\ModernPipManager.exe").Length / 1MB
            echo "[SUCCESS] Build basarili - Boyut: $([math]::Round($size, 1)) MB"
        } else {
            echo "[ERROR] Build basarisiz!"
            exit 1
        }
        
    - name: "Create release package"
      run: |
        mkdir release
        copy "dist\ModernPipManager.exe" "release\"
        copy "README.md" "release\" -ErrorAction SilentlyContinue
        copy "version.py" "release\"
        
        echo "[SUCCESS] Release paketi hazir"
        
    - name: "Upload build artifacts"
      uses: actions/upload-artifact@v4
      with:
        name: ModernPipManager-${{ env.BUILD_VERSION }}
        path: release/
        retention-days: 30
        
    - name: "Create GitHub Release"
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.BUILD_VERSION }}
        name: "Modern Pip Manager ${{ env.BUILD_VERSION }}"
        body: |
          [SUCCESS] Modern Python Pip Paket Yoneticisi - Yeni Surum
          
          Ozellikleri:
          - Modern ttkbootstrap arayuzu
          - Paket arama ve yukleme
          - Paket guncelleme ve kaldirma
          - Requirements.txt yonetimi
          - Otomatik paket boyut hesaplama
          
          [INFO] Build Bilgileri:
          - Surum: ${{ env.BUILD_VERSION }}
          - Build Tarihi: ${{ github.event.head_commit.timestamp }}
          - Commit: ${{ github.sha }}
          
          [INFO] Kullanim:
          1. ModernPipManager.exe dosyasini indirin
          2. Herhangi bir klasore kaydedin
          3. Cift tikla calistirin
          
          Gereksinimler: Windows 10/11
        files: |
          dist/ModernPipManager.exe
        draft: false
        prerelease: false
        token: ${{ secrets.GITHUB_TOKEN }}

  build-info:
    name: 📋 Build Information
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: 📊 Show Build Summary
      run: |
        echo "[SUCCESS] Build completed successfully!"
        echo "[INFO] Executable created for Windows"
        echo "[INFO] Release created with tag: ${{ env.BUILD_VERSION }}"
        echo "[INFO] Artifacts uploaded to GitHub" 