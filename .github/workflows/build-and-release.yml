name: 🚀 Build and Release

# Her push ve pull request'te çalış
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# İş izinleri
permissions:
  contents: write

jobs:
  build-windows:
    name: 🏗️ Windows Build
    runs-on: windows-latest
    
    steps:
    - name: 📂 Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: 📋 Show Environment Info
      run: |
        python --version
        pip --version
        pip list
    
    - name: 🔨 Build Executable
      run: |
        python build_exe.py
    
    - name: 📏 Check Build Size
      run: |
        if (Test-Path "dist/ModernPipManager.exe") {
          $size = (Get-Item "dist/ModernPipManager.exe").Length / 1MB
          Write-Host "📏 Exe boyutu: $([math]::Round($size, 2)) MB"
        } else {
          Write-Host "❌ Exe dosyası bulunamadı!"
          exit 1
        }
    
    - name: 📅 Generate Version
      id: version
      run: |
        $date = Get-Date -Format "yyyy.MM.dd"
        $time = Get-Date -Format "HHmm"
        $commit = "${{ github.sha }}".Substring(0,7)
        $version = "v$date-$time-$commit"
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "Generated version: $version"
    
    - name: 📦 Create Release Archive
      run: |
        # Exe dosyasını zip'le
        Compress-Archive -Path "dist/ModernPipManager.exe" -DestinationPath "ModernPipManager-Windows.zip"
        
        # Release notları oluştur
        @"
        # 🚀 Modern Python Pip Paket Yöneticisi - ${{ steps.version.outputs.VERSION }}
        
        ## 📥 İndirme
        - **Windows Executable**: ModernPipManager-Windows.zip (Windows 10/11)
        
        ## 🔧 Kullanım
        1. Zip dosyasını indirin
        2. Zip'i açın
        3. ModernPipManager.exe'yi çalıştırın
        
        ## ✨ Bu Sürümde
        - Modern ttkbootstrap tema entegrasyonu
        - Bootstrap renk paletiyle butonlar
        - Gelişmiş kullanıcı arayüzü
        - Paket yönetimi özellikleri
        
        ## 🐛 Sorun Bildirimi
        Herhangi bir sorunla karşılaştığınızda [Issues](https://github.com/${{ github.repository }}/issues) sayfasından bildirebilirsiniz.
        
        ---
        **Commit**: ${{ github.sha }}  
        **Build Date**: $(Get-Date -Format "yyyy-MM-dd HH:mm:ss") UTC  
        **Python Version**: $(python --version)
        "@ | Out-File -FilePath "RELEASE_NOTES.md" -Encoding UTF8
    
    - name: 🎉 Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        name: "🚀 Release ${{ steps.version.outputs.VERSION }}"
        body_path: RELEASE_NOTES.md
        files: |
          ModernPipManager-Windows.zip
          dist/ModernPipManager.exe
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 📊 Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-executable
        path: |
          dist/ModernPipManager.exe
          ModernPipManager-Windows.zip
        retention-days: 30

  build-info:
    name: 📋 Build Information
    runs-on: ubuntu-latest
    needs: build-windows
    
    steps:
    - name: 📊 Show Build Summary
      run: |
        echo "🎉 Build completed successfully!"
        echo "📦 Executable created for Windows"
        echo "🔗 Release created with tag: ${{ needs.build-windows.outputs.VERSION }}"
        echo "📁 Artifacts uploaded to GitHub" 